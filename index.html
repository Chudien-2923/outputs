  <style>
    :root {
      --warm-canvas: #f5f3ea;
      --deep-ink: #101418;
      --willow-green: #1f6f50;
      --willow-deep: #16523a;
      --mint-signal: #35c48b;
      --night-forest: #0b1514;
      --claude-ember: #d97745;
      --soft-ember: #f3c7ae;
      --soft-green: #d8f5b0;
      --line: #dfded4;
      --muted: #66706b;
      --card: #fffdf6;
      --white: #ffffff;

      --shadow-sm: 0 8px 24px rgba(16, 20, 24, 0.07);
      --mono: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --display: "Space Grotesk", Inter, ui-sans-serif, system-ui, sans-serif;
    }
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0; color: var(--deep-ink);
      background:
        linear-gradient(rgba(223,222,212,.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(223,222,212,.6) 1px, transparent 1px),
        var(--warm-canvas);
      background-size: 72px 72px; font-family: var(--sans); line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }
    .page { width: min(1040px, calc(100% - 36px)); margin: 0 auto; }
    h1, h2, h3 { font-family: var(--display); margin: 0; line-height: 1.05; }

    .hero { padding: 60px 0 26px; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 10px; padding: 9px 14px;
      border: 1px solid rgba(31,111,80,.28); border-radius: 999px; background: rgba(255,253,246,.85);
      color: var(--willow-green); font-family: var(--mono); font-size: 12.5px; font-weight: 700;
      letter-spacing: .02em; text-transform: uppercase;
    }
    .eyebrow-mark { width: 11px; height: 11px; border-radius: 50%; background: var(--mint-signal); box-shadow: 0 0 0 5px rgba(53,196,139,.16); }
    h1 { margin-top: 20px; font-size: clamp(34px, 5.6vw, 58px); max-width: 760px; }
    h1 em { font-style: normal; color: var(--willow-green); }
    .hero-copy { max-width: 600px; margin: 18px 0 0; font-size: clamp(16px, 2.2vw, 19px); color: #2a332e; }

    .count-line { margin-top: 16px; font-family: var(--mono); font-size: 13px; color: var(--muted); }

    .grid { margin-top: 34px; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .pack {
      border: 1px solid var(--line); border-radius: 20px; background: var(--card);
      box-shadow: var(--shadow-sm); overflow: hidden; display: flex; flex-direction: column;
      transition: transform .14s ease, box-shadow .14s ease;
    }
    .pack:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
    .pack-thumb { aspect-ratio: 16 / 11; background: #ece9df; position: relative; overflow: hidden; }
    .pack-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .pack-badge {
      position: absolute; top: 12px; left: 12px; font-family: var(--mono); font-size: 11px; font-weight: 700;
      color: #fff; background: rgba(11,21,20,.74); backdrop-filter: blur(4px); padding: 5px 10px; border-radius: 999px;
      letter-spacing: .02em;
    }
    .pack-body { padding: 20px 22px 22px; display: flex; flex-direction: column; flex: 1; }
    .pack-body h3 { font-size: 19px; }
    .pack-body .desc { margin: 9px 0 0; color: #46504a; font-size: 14px; flex: 1; }
    .pack-actions { display: flex; gap: 10px; margin-top: 18px; }
    .btn {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 11px 14px; border-radius: 11px; font-weight: 700; font-size: 14px; cursor: pointer;
      border: 1px solid var(--line); transition: filter .12s ease, transform .12s ease, background .12s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-open { background: var(--willow-green); color: #fff; border-color: var(--willow-green); }
    .btn-open:hover { filter: brightness(1.08); }
    .btn-copy { background: var(--white); color: var(--willow-deep); }
    .btn-copy:hover { border-color: var(--willow-green); }
    .btn-copy.done { background: var(--mint-signal); color: #06120c; border-color: var(--mint-signal); }

    footer { margin: 48px 0 60px; color: var(--muted); font-size: 13px; font-family: var(--mono); display: flex; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

    .toast {
      position: fixed; left: 50%; bottom: 28px; transform: translateX(-50%) translateY(20px);
      background: var(--deep-ink); color: #fff; padding: 12px 20px; border-radius: 12px; font-size: 14px;
      font-weight: 600; opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 50;
      box-shadow: 0 12px 30px rgba(0,0,0,.25);
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 700px) { .grid { grid-template-columns: 1fr; } }

    const toast = document.getElementById("toast");
    let tt;
    function showToast(msg){ toast.textContent = msg; toast.classList.add("show"); clearTimeout(tt); tt = setTimeout(()=>toast.classList.remove("show"),1500); }
    async function copyText(t){
      try { await navigator.clipboard.writeText(t); }
      catch(e){ const ta=document.createElement("textarea"); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); }
    }

    document.getElementById("countLine").textContent = PACKS.length + " bộ prompt · cập nhật " + ("2026-06-15");
    const grid = document.getElementById("grid");
    PACKS.forEach(p => {
      const url = BASE + p.file;
      const el = document.createElement("article");
      el.className = "pack";
      el.innerHTML = `
        <div class="pack-thumb"><img src="${p.thumb}" alt="${p.title}" loading="lazy"><span class="pack-badge">${p.count} prompt</span></div>
        <div class="pack-body">
          <h3>${p.title}</h3>
          <p class="desc">${p.desc}</p>
          <div class="pack-actions">
            <a class="btn btn-open" href="${p.file}" target="_blank" rel="noopener">Xem trang</a>
            <button class="btn btn-copy" type="button">Copy link</button>
          </div>
        </div>`;
      const btn = el.querySelector(".btn-copy");
      btn.addEventListener("click", async () => {
        await copyText(url);
        btn.textContent = "Đã copy ✓"; btn.classList.add("done");
        showToast("Đã copy link — dán gửi khách!");
        setTimeout(()=>{ btn.textContent="Copy link"; btn.classList.remove("done"); }, 1500);
      });
      grid.appendChild(el);
    });
  </script>
