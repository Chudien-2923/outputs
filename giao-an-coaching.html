<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --cream:#F5F3EA; --cream-2:#EFEBDD; --paper:#FBFAF4;
  --ink:#101418; --ink-soft:#3A4048; --muted:#6B7178;
  --willow:#1F6F50; --willow-deep:#16543C; --willow-soft:#E4EFE8;
  --amber:#C8743A; --line:#DAD5C4;
  --shadow:0 1px 2px rgba(16,20,24,.04),0 12px 30px -12px rgba(16,20,24,.16);
  --radius:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:'Be Vietnam Pro',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:var(--cream); color:var(--ink);
  line-height:1.62; font-size:17px; -webkit-font-smoothing:antialiased;
}
.wrap{max-width:880px;margin:0 auto;padding:0 22px}
h1,h2,h3,.display{font-family:'Space Grotesk',sans-serif;letter-spacing:-.01em;line-height:1.18}
.serif{font-family:'Playfair Display',serif;font-style:italic}
a{color:inherit}

/* ---------- HERO ---------- */
.hero{padding:64px 0 30px;text-align:center}
.kicker{display:inline-flex;align-items:center;gap:8px;font-family:'Space Grotesk',sans-serif;
  font-size:12.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
  color:var(--willow-deep);background:var(--willow-soft);padding:7px 15px;border-radius:100px;margin-bottom:24px}
.kicker .dot{width:7px;height:7px;border-radius:50%;background:var(--willow);box-shadow:0 0 0 4px rgba(31,111,80,.18)}
.hero h1{font-size:clamp(30px,5.4vw,50px);font-weight:700;margin-bottom:14px}
.hero h1 .hl{color:var(--willow)}
.hero .sub{font-size:clamp(16px,2.4vw,20px);color:var(--ink-soft);font-weight:500;max-width:600px;margin:0 auto}
.promise{max-width:660px;margin:34px auto 0;background:var(--paper);border:1px solid var(--line);
  border-radius:var(--radius);padding:26px 28px;box-shadow:var(--shadow);text-align:left;position:relative}
.promise::before{content:"";position:absolute;left:0;top:18px;bottom:18px;width:4px;border-radius:4px;background:linear-gradient(var(--willow),var(--amber))}
.promise p{font-size:17px;color:var(--ink-soft);padding-left:14px}
.promise b{color:var(--ink);font-weight:600}

/* ---------- SECTION SHELL ---------- */
.sec{padding:30px 0}
.sec-head{text-align:center;max-width:620px;margin:0 auto 34px}
.sec-head .eyebrow{font-family:'Space Grotesk',sans-serif;font-size:12.5px;font-weight:600;
  letter-spacing:.14em;text-transform:uppercase;color:var(--amber);margin-bottom:10px}
.sec-head h2{font-size:clamp(24px,3.6vw,32px);font-weight:700}
.sec-head p{color:var(--muted);margin-top:8px}

/* ---------- TIMELINE ---------- */
.timeline{position:relative}
.timeline::before{content:"";position:absolute;left:23px;top:14px;bottom:60px;width:2px;
  background:linear-gradient(var(--willow),var(--line));border-radius:2px}
.stage{position:relative;padding-left:64px;margin-bottom:30px}
.stage .node{position:absolute;left:0;top:0;width:48px;height:48px;border-radius:14px;
  background:var(--willow);color:#fff;display:flex;align-items:center;justify-content:center;
  font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:20px;
  box-shadow:0 8px 18px -6px rgba(31,111,80,.55);z-index:2}
.stage.star .node{background:var(--amber);box-shadow:0 8px 18px -6px rgba(200,116,58,.55)}
.card{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);
  padding:24px 26px;box-shadow:var(--shadow);transition:transform .18s ease,box-shadow .18s ease}
.card:hover{transform:translateY(-2px);box-shadow:0 2px 4px rgba(16,20,24,.05),0 20px 40px -16px rgba(16,20,24,.22)}
.card h3{font-size:clamp(19px,2.7vw,23px);font-weight:700;margin-bottom:4px}
.card h3 .star{color:var(--amber)}
.card .tailor{display:inline-block;font-size:12px;font-weight:600;color:var(--willow-deep);
  background:var(--willow-soft);padding:3px 10px;border-radius:100px;margin-bottom:12px}
.card ul{list-style:none;margin:10px 0 0}
.card li{position:relative;padding-left:24px;margin-bottom:11px;color:var(--ink-soft);font-size:16px}
.card li::before{content:"";position:absolute;left:3px;top:10px;width:8px;height:8px;border-radius:50%;
  background:var(--willow-soft);border:2px solid var(--willow)}
.card li b{color:var(--ink);font-weight:600}
.card li em{font-style:normal;color:var(--willow-deep);font-weight:500}
.outcome{margin-top:16px;padding:13px 16px;border-radius:12px;background:var(--willow-soft);
  display:flex;gap:10px;align-items:flex-start;font-size:15.5px;color:var(--willow-deep)}
.outcome svg{flex-shrink:0;margin-top:3px}
.outcome b{color:var(--willow-deep);font-weight:700}

/* visual slot */
.vis{margin:18px 0 4px;border-radius:14px;background:linear-gradient(160deg,var(--cream-2),var(--paper));
  border:1px solid var(--line);padding:18px;display:flex;justify-content:center}
.vis svg{max-width:100%;height:auto}
.imgwrap{margin:18px 0 4px;position:relative}
.imgwrap img{width:100%;display:block;border-radius:14px;border:1px solid var(--line);box-shadow:var(--shadow)}
.imgwrap .ph2{display:none}
.imgwrap.miss img{display:none}
.imgwrap.miss .ph2{display:block;border:2px dashed var(--line);border-radius:14px;
  background:repeating-linear-gradient(135deg,var(--paper),var(--paper) 12px,var(--cream-2) 12px,var(--cream-2) 24px);
  padding:34px 20px;text-align:center;color:var(--muted)}
.imgwrap .ph-ic{font-size:26px;margin-bottom:6px}
.imgwrap .ph-t{font-family:'Space Grotesk',sans-serif;font-weight:600;color:var(--ink-soft);font-size:14px}
.imgwrap .ph-s{font-size:12.5px;margin-top:3px}

/* ---------- TAKEAWAY ---------- */
.take{background:var(--ink);color:var(--cream);border-radius:24px;padding:38px 34px;margin:14px 0;
  box-shadow:0 30px 60px -24px rgba(16,20,24,.5)}
.take h2{font-size:clamp(22px,3.4vw,28px);text-align:center;margin-bottom:6px}
.take .lead{text-align:center;color:#B9BEC4;margin-bottom:26px}
.take-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.take-col{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:22px}
.take-col .tag{font-family:'Space Grotesk',sans-serif;font-size:12px;font-weight:600;letter-spacing:.12em;
  text-transform:uppercase;color:#fff;padding:5px 12px;border-radius:100px;display:inline-block;margin-bottom:14px}
.take-col.skill .tag{background:var(--willow)}
.take-col.asset .tag{background:var(--amber)}
.take-col ul{list-style:none}
.take-col li{position:relative;padding-left:26px;margin-bottom:10px;color:#E6E8EA;font-size:15.5px}
.take-col li::before{content:"";position:absolute;left:0;top:8px;width:14px;height:9px;border-left:2px solid var(--willow);border-bottom:2px solid var(--willow);transform:rotate(-45deg)}
.take-col.asset li::before{border-color:var(--amber)}

/* ---------- FIT ---------- */
.fit-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.fit{background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow)}
.fit h3{font-size:17px;display:flex;align-items:center;gap:9px;margin-bottom:12px}
.fit.yes h3{color:var(--willow-deep)} .fit.no h3{color:var(--amber)}
.fit p{color:var(--ink-soft);font-size:15.5px}
.fit .ico{width:26px;height:26px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;font-weight:700}
.fit.yes .ico{background:var(--willow)} .fit.no .ico{background:var(--amber)}

/* ---------- PROOF ---------- */
.proof-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.proof{background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--willow);
  border-radius:14px;padding:22px 24px;box-shadow:var(--shadow)}
.proof .who{font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:14px;color:var(--willow-deep);margin-bottom:8px}
.proof .arc{color:var(--ink-soft);font-size:15.5px}
.proof .arc .b4{color:var(--muted)} .proof .arc .af{color:var(--ink);font-weight:600}

/* ---------- CTA ---------- */
.cta{text-align:center;padding:50px 0 30px}
.cta h2{font-size:clamp(24px,3.8vw,34px);font-weight:700;margin-bottom:10px}
.cta p{color:var(--ink-soft);max-width:520px;margin:0 auto 26px}
.btn{display:inline-flex;align-items:center;gap:10px;background:var(--willow);color:#fff;
  font-family:'Space Grotesk',sans-serif;font-weight:600;font-size:17px;text-decoration:none;
  padding:16px 32px;border-radius:100px;box-shadow:0 14px 30px -10px rgba(31,111,80,.6);
  transition:transform .15s ease,box-shadow .15s ease}
.btn:hover{transform:translateY(-2px);box-shadow:0 20px 40px -12px rgba(31,111,80,.7)}
.cta-phone{margin-top:14px;font-family:'Space Grotesk',sans-serif;font-size:14px;color:var(--muted)}
.cta-phone b{color:var(--ink);font-weight:600}
.foot{text-align:center;color:var(--muted);font-size:13px;padding:24px 0 50px}
.foot .upd{font-family:'Space Grotesk',sans-serif}

@media(max-width:680px){
  body{font-size:16px}
  .hero{padding:48px 0 22px}
  .take-grid,.fit-grid,.proof-grid{grid-template-columns:1fr}
  .take,.cta{padding-left:0;padding-right:0}
  .take{padding:30px 22px}
  .stage{padding-left:54px}
  .timeline::before{left:19px}
  .stage .node{width:40px;height:40px;font-size:17px}
  .card{padding:20px 18px}
}
</style>
</head>

function el(html){const t=document.createElement('template');t.innerHTML=html.trim();return t.content.firstChild;}

document.getElementById('hero-h1').innerHTML = COURSE.title_html + ' ' + COURSE.title_tail;
document.getElementById('hero-sub').textContent = COURSE.sub;
document.getElementById('hero-promise').innerHTML = COURSE.promise;

const tl = document.getElementById('timeline');
STAGES.forEach(s=>{
  let visHtml = '';
  if(s.vis){ visHtml = `<div class="vis">${SVG[s.vis]}</div>`; }
  else if(s.img){
    visHtml = `<div class="imgwrap"><img src="${s.img.src}" alt="${s.img.label}" onerror="this.parentNode.classList.add('miss')">`+
      `<div class="ph2"><div class="ph-ic">🖼️</div><div class="ph-t">${s.img.label}</div>`+
      (s.img.hint?`<div class="ph-s">${s.img.hint}</div>`:'')+`</div></div>`;
  }
  const phHtml = '';
  const tailor = s.tailor ? `<span class="tailor">may đo riêng</span>` : '';
  const star = s.star ? ' <span class="star">★</span>' : '';
  const lis = s.bullets.map(b=>`<li>${b}</li>`).join('');
  tl.appendChild(el(`
    <div class="stage${s.star?' star':''}">
      <div class="node">${s.n}</div>
      <div class="card">
        <h3>${s.title}${star}</h3>
        ${tailor}
        <ul>${lis}</ul>
        ${visHtml}${phHtml}
        <div class="outcome">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M5 13l4 4L19 7" stroke="#16543C" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div><b>Có:</b> ${s.outcome}</div>
        </div>
      </div>
    </div>`));
});

const tk = document.getElementById('takeaway');
TAKEAWAY.forEach(c=>{
  tk.appendChild(el(`<div class="take-col ${c.cls}"><span class="tag">${c.tag}</span><ul>${c.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`));
});
